<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Centre</title>
<style>
  * { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 100vh;
    padding: 20px;
    margin: 0;
    color: #e0e0e0;
  }

  .container { max-width: 850px; margin: 0 auto; }

  h1 {
    text-align: center;
    color: #fff;
    font-size: 2rem;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .subtitle {
    text-align: center;
    color: #8892b0;
    margin-bottom: 25px;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* ── Stale data banner ── */
  .stale-banner {
    display: none;
    background: rgba(220, 53, 69, 0.15);
    border: 1px solid rgba(220, 53, 69, 0.35);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #fc8181;
    text-align: center;
  }
  .stale-banner.visible { display: block; }

  .search-box {
    width: 100%;
    padding: 14px 20px;
    font-size: 15px;
    border: 2px solid #2d3748;
    border-radius: 12px;
    background: linear-gradient(145deg, #1e2a4a, #1a233a);
    color: #e0e0e0;
    margin-bottom: 25px;
    transition: all 0.3s ease;
  }
  .search-box:focus { outline: none; border-color: #4a90d9; }
  .search-box::placeholder { color: #6b7280; }

  .matches-container { display: flex; flex-direction: column; gap: 14px; }

  .match {
    background: linear-gradient(145deg, #1e2a4a 0%, #1a233a 100%);
    border: 1px solid #2d3748;
    border-left: 4px solid #4a90d9;
    border-radius: 12px;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .match:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(74,144,217,0.2); }
  .match.expanded { border-color: #4a90d9; }

  .match-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .match-teams { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
  .team-name { font-size: 1.15rem; font-weight: 700; color: #fff; }
  .vs-badge {
    background: linear-gradient(135deg, #2d3748, #3d4a5c);
    color: #a0aec0;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }

  .match-meta {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .match-meta small { color: #6b7280; font-size: 0.8rem; }

  .expand-arrow {
    color: #4a90d9;
    font-size: 16px;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(74,144,217,0.1);
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
  }
  .match.expanded .expand-arrow { transform: rotate(180deg); background: rgba(74,144,217,0.2); }

  .match-details { max-height: 0; overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1); }
  .match.expanded .match-details { max-height: 1200px; }

  .match-details-inner {
    padding: 14px 18px 16px;
    border-top: 1px solid rgba(255,255,255,0.05);
    background: rgba(0,0,0,0.15);
  }

  .details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }

  .details-section {
    background: linear-gradient(145deg, rgba(30,42,74,0.7), rgba(26,35,58,0.85));
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(74,144,217,0.12);
  }
  .details-section h4 {
    margin: 0 0 12px;
    color: #4a90d9;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
  }

  /* ── Prediction bar ── */
  .prediction-section { grid-column: 1 / -1; }
  .pred-bars { display: flex; flex-direction: column; gap: 8px; }
  .pred-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .pred-label { width: 80px; color: #a0aec0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pred-track { flex: 1; background: rgba(255,255,255,0.07); border-radius: 4px; height: 8px; }
  .pred-fill { height: 8px; border-radius: 4px; transition: width 0.6s ease; }
  .pred-fill.home  { background: linear-gradient(90deg, #28a745, #20c94a); }
  .pred-fill.draw  { background: linear-gradient(90deg, #6c757d, #8a9299); }
  .pred-fill.away  { background: linear-gradient(90deg, #dc3545, #e05260); }
  .pred-pct { width: 36px; text-align: right; font-weight: 700; color: #fff; font-size: 13px; }
  .confidence-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .conf-high   { background: rgba(40,167,69,0.2);  color: #5eed7a; }
  .conf-medium { background: rgba(255,193,7,0.2);  color: #ffc107; }
  .conf-low    { background: rgba(108,117,125,0.2); color: #a0aec0; }

  /* ── H2H summary ── */
  .h2h-summary { display: flex; gap: 8px; margin-bottom: 12px; }
  .h2h-stat {
    flex: 1; text-align: center;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 10px 6px;
  }
  .h2h-stat .num { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .h2h-stat .lbl { font-size: 10px; color: #8892b0; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .h2h-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .h2h-table td { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #c0c8d0; }
  .h2h-table td:first-child { color: #8892b0; }
  .h2h-result { font-weight: 700; }
  .h2h-H { color: #5eed7a; }
  .h2h-A { color: #fc8181; }
  .h2h-D { color: #a0aec0; }
  .h2h-loading { color: #6b7280; font-size: 12px; font-style: italic; }

  /* ── Form ── */
  .form-row { display: flex; align-items: center; padding: 8px 0; gap: 10px; font-size: 0.85rem; }
  .form-row .team-name { min-width: 100px; color: #8892b0; font-size: 0.85rem; font-weight: 500; }
  .form-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .form-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 26px; height: 26px; border-radius: 6px;
    font-size: 12px; font-weight: 700; color: white;
  }
  .form-W { background: linear-gradient(135deg, #28a745, #20c94a); }
  .form-D { background: linear-gradient(135deg, #6c757d, #5a6268); }
  .form-L { background: linear-gradient(135deg, #dc3545, #c82333); }

  /* ── Badges ── */
  .prediction-badge {
    display: inline-flex; align-items: center;
    padding: 4px 10px; border-radius: 16px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .prediction-home { background: rgba(40,167,69,0.2);  color: #5eed7a;  border: 1px solid rgba(40,167,69,0.25); }
  .prediction-draw { background: rgba(108,117,125,0.2); color: #a0aec0; border: 1px solid rgba(108,117,125,0.25); }
  .prediction-away { background: rgba(220,53,69,0.2);   color: #fc8181;  border: 1px solid rgba(220,53,69,0.25); }

  .league-badge {
    display: inline-flex; align-items: center;
    padding: 4px 10px; background: rgba(74,144,217,0.15);
    border-radius: 6px; font-size: 10px; font-weight: 600;
    color: #4a90d9; border: 1px solid rgba(74,144,217,0.25);
  }
  .status-badge {
    display: inline-flex; align-items: center;
    padding: 4px 10px; border-radius: 6px;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .status-NS   { background: rgba(74,144,217,0.15);  color: #4a90d9; border: 1px solid rgba(74,144,217,0.25); }
  .status-FT   { background: rgba(108,117,125,0.15); color: #a0aec0; border: 1px solid rgba(108,117,125,0.25); }
  .status-LIVE { background: rgba(220,53,69,0.15);   color: #fc8181;  border: 1px solid rgba(220,53,69,0.25); animation: livePulse 1.5s infinite; }

  @keyframes livePulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(220,53,69,0.3); }
    50%      { box-shadow: 0 0 0 5px rgba(220,53,69,0); }
  }

  /* ── Refresh indicator ── */
  .refresh-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4a90d9; display: inline-block;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .refresh-dot.loading { background: #ffc107; animation: spin 1s linear infinite; width:12px;height:12px;border:2px solid #ffc107;border-top-color:transparent;border-radius:50%;background:transparent; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .loading {
    text-align: center; padding: 70px 20px; color: #8892b0;
  }
  .loading-spinner {
    display: inline-block; width: 45px; height: 45px;
    border: 3px solid rgba(74,144,217,0.2); border-top-color: #4a90d9;
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  .loading-text { margin-top: 18px; font-size: 0.95rem; color: #8892b0; }

  .empty-state { text-align: center; padding: 70px 20px; color: #8892b0; }

  .notification {
    position: fixed; top: 20px; right: 20px; max-width: 300px;
    padding: 14px 18px;
    background: linear-gradient(135deg, rgba(30,42,74,0.95), rgba(26,35,58,0.95));
    border: 1px solid rgba(74,144,217,0.3); border-left: 3px solid #4a90d9;
    border-radius: 10px; color: #e0e0e0; font-size: 13px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 1000;
    animation: slideIn 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .notification.warn { border-left-color: #ffc107; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

  @media (max-width: 600px) {
    body { padding: 15px; }
    h1 { font-size: 1.5rem; }
    .match-header { padding: 14px 15px; }
    .team-name { font-size: 1rem; }
    .match-teams { width: 100%; }
    .details-grid { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>⚽ Match Centre</h1>
  <p class="subtitle">
    <span id="refreshDot" class="refresh-dot" title="Auto-refreshes every 5 min"></span>
    Predictions · Form · Head-to-head
  </p>

  <div id="staleBanner" class="stale-banner"></div>

  <input type="text" id="searchInput" class="search-box"
    placeholder="Search by team..." oninput="filterMatches()" />

  <div id="matches">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading matches...</p>
    </div>
  </div>
</div>

<script>
  let allMatches = [];
  let refreshTimer = null;
  const REFRESH_MS = 5 * 60 * 1000; // 5 minutes

  // ── Sample fallback ────────────────────────────────────────────────────────
  const sampleMatches = [
    {
      id: 1001,
      time: new Date(Date.now() + 86400000).toISOString(),
      home: "Arsenal", away: "Chelsea",
      league: "Premier League", status: "NS",
      prediction: { home: 48, draw: 24, away: 28, confidence: "high" },
      form: { Arsenal: ["W","W","D","W","L"], Chelsea: ["W","L","W","D","W"] },
    },
    {
      id: 1002,
      time: new Date(Date.now() + 172800000).toISOString(),
      home: "Manchester City", away: "Liverpool",
      league: "Premier League", status: "NS",
      prediction: { home: 52, draw: 23, away: 25, confidence: "high" },
      form: { "Manchester City": ["W","W","W","D","W"], Liverpool: ["W","W","L","W","D"] },
    },
  ];

  // ── Data loading ───────────────────────────────────────────────────────────
  async function loadMatches(silent = false) {
    if (!silent) setDot("loading");
    try {
      const res  = await fetch("/api/matches");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Handle both old shape (array) and new shape ({matches, meta})
      if (Array.isArray(data)) {
        allMatches = data;
      } else {
        allMatches = data.matches || [];
        handleMeta(data.meta);
      }

      if (allMatches.length === 0 && !silent) showNotification("No upcoming fixtures found.");
      renderMatches(filterBySearch(allMatches));
      setDot("ok");
    } catch (err) {
      console.warn("API unavailable:", err.message);
      if (!silent) {
        allMatches = sampleMatches;
        renderMatches(sampleMatches);
        showNotification("API unavailable — showing sample data", "warn");
      }
      setDot("ok");
    }
    scheduleRefresh();
  }

  function handleMeta(meta) {
    if (!meta) return;
    const banner = document.getElementById("staleBanner");
    if (meta.stale) {
      banner.textContent = `⚠️  Fixture data is ${meta.hours_since_fetch ?? "?"}h old. Run import_fixtures.py to refresh.`;
      banner.classList.add("visible");
    } else {
      banner.classList.remove("visible");
    }
  }

  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(() => loadMatches(true), REFRESH_MS);
  }

  function setDot(state) {
    const d = document.getElementById("refreshDot");
    d.className = "refresh-dot" + (state === "loading" ? " loading" : "");
  }

  // ── H2H fetch (on expand) ──────────────────────────────────────────────────
  const h2hCache = {};
  async function fetchH2H(home, away, containerId) {
    const key = `${home}|${away}`;
    if (h2hCache[key]) return renderH2H(h2hCache[key], containerId, home, away);

    const el = document.getElementById(containerId);
    if (el) el.innerHTML = `<span class="h2h-loading">Loading head-to-head...</span>`;

    try {
      const res  = await fetch(`/api/h2h?home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      h2hCache[key] = data;
      renderH2H(data, containerId, home, away);
    } catch {
      const el2 = document.getElementById(containerId);
      if (el2) el2.innerHTML = `<span class="h2h-loading">H2H data unavailable</span>`;
    }
  }

  function renderH2H(data, containerId, home, away) {
    const el = document.getElementById(containerId);
    if (!el) return;
    const { summary, meetings } = data;
    const total = summary.home_wins + summary.draws + summary.away_wins || 1;
    const rows  = meetings.slice(0, 6).map(m => {
      const label = m.ftr === "D" ? "Draw"
        : m.ftr === "H" ? `${m.home} win`
        : `${m.away} win`;
      const cls = `h2h-${m.ftr}`;
      return `<tr>
        <td>${m.match_date?.slice(0,7) || ""}</td>
        <td>${esc(m.home)} ${m.fthg}–${m.ftag} ${esc(m.away)}</td>
        <td class="h2h-result ${cls}">${label}</td>
      </tr>`;
    }).join("");

    el.innerHTML = `
      <div class="h2h-summary">
        <div class="h2h-stat">
          <div class="num">${summary.home_wins}</div>
          <div class="lbl">${esc(home.split(" ").pop())} wins</div>
        </div>
        <div class="h2h-stat">
          <div class="num">${summary.draws}</div>
          <div class="lbl">Draws</div>
        </div>
        <div class="h2h-stat">
          <div class="num">${summary.away_wins}</div>
          <div class="lbl">${esc(away.split(" ").pop())} wins</div>
        </div>
      </div>
      <table class="h2h-table"><tbody>${rows}</tbody></table>
    `;
  }

  // ── Rendering ──────────────────────────────────────────────────────────────
  function filterBySearch(matches) {
    const q = document.getElementById("searchInput").value.toLowerCase();
    return q ? matches.filter(m =>
      m.home.toLowerCase().includes(q) || m.away.toLowerCase().includes(q)
    ) : matches;
  }

  function filterMatches() { renderMatches(filterBySearch(allMatches)); }

  function renderMatches(data) {
    const container = document.getElementById("matches");
    if (!data.length) {
      container.innerHTML = `<div class="empty-state"><p>No matches found</p></div>`;
      return;
    }
    const list = document.createElement("div");
    list.className = "matches-container";
    data.forEach((match, i) => list.appendChild(createMatchEl(match, i)));
    container.innerHTML = "";
    container.appendChild(list);
  }

  function createMatchEl(match, index) {
    const div       = document.createElement("div");
    div.className   = "match";
    div.dataset.idx = index;
    div.onclick     = () => toggleDetails(div, match);

    const pred      = match.prediction || {};
    const homeForm  = match.form?.[match.home] || [];
    const awayForm  = match.form?.[match.away] || [];
    const statusCls = match.status || "NS";
    const favBadge  = getFavBadge(pred);
    const h2hId     = `h2h-${match.id || index}`;

    div.innerHTML = `
      <div class="match-header">
        <div class="match-teams">
          <span class="team-name">${esc(match.home)}</span>
          <span class="vs-badge">VS</span>
          <span class="team-name">${esc(match.away)}</span>
        </div>
        <div class="expand-arrow">▼</div>
      </div>
      <div class="match-meta">
        <span class="status-badge status-${statusCls}">${fmtStatus(statusCls)}</span>
        <span class="league-badge">${esc(match.league || "")}</span>
        ${favBadge}
        <small style="margin-left:auto">${fmtDate(match.time)}</small>
      </div>
      <div class="match-details">
        <div class="match-details-inner">
          <div class="details-grid">

            ${pred.home !== null && pred.home !== undefined ? `
            <div class="details-section prediction-section">
              <h4>Model prediction</h4>
              <div class="pred-bars">
                <div class="pred-row">
                  <span class="pred-label" title="${esc(match.home)}">${esc(match.home)}</span>
                  <div class="pred-track"><div class="pred-fill home" style="width:${pred.home}%"></div></div>
                  <span class="pred-pct">${pred.home}%</span>
                </div>
                <div class="pred-row">
                  <span class="pred-label">Draw</span>
                  <div class="pred-track"><div class="pred-fill draw" style="width:${pred.draw}%"></div></div>
                  <span class="pred-pct">${pred.draw}%</span>
                </div>
                <div class="pred-row">
                  <span class="pred-label" title="${esc(match.away)}">${esc(match.away)}</span>
                  <div class="pred-track"><div class="pred-fill away" style="width:${pred.away}%"></div></div>
                  <span class="pred-pct">${pred.away}%</span>
                </div>
              </div>
              <span class="confidence-tag conf-${pred.confidence || 'low'}">${pred.confidence || 'low'} confidence · ${pred.data_points || 0} games</span>
            </div>` : ""}

            <div class="details-section">
              <h4>Form (last 5)</h4>
              <div class="form-row">
                <span class="team-name">${esc(match.home)}</span>
                <div class="form-badges">${fmtForm(homeForm)}</div>
              </div>
              <div class="form-row">
                <span class="team-name">${esc(match.away)}</span>
                <div class="form-badges">${fmtForm(awayForm)}</div>
              </div>
            </div>

            <div class="details-section">
              <h4>Head to head</h4>
              <div id="${h2hId}"><span class="h2h-loading">Expand to load...</span></div>
            </div>

          </div>
        </div>
      </div>
    `;
    return div;
  }

  function toggleDetails(el, match) {
    const wasExpanded = el.classList.contains("expanded");
    el.classList.toggle("expanded");
    if (!wasExpanded) {
      fetchH2H(match.home, match.away, `h2h-${match.id || el.dataset.idx}`);
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function getFavBadge(pred) {
    if (!pred || pred.home === null) return "";
    if (pred.home > pred.away && pred.home > pred.draw)
      return `<span class="prediction-badge prediction-home">Home fav ${pred.home}%</span>`;
    if (pred.away > pred.home && pred.away > pred.draw)
      return `<span class="prediction-badge prediction-away">Away fav ${pred.away}%</span>`;
    return `<span class="prediction-badge prediction-draw">Even match</span>`;
  }

  function fmtForm(form) {
    if (!form.length) return `<span style="color:#666">—</span>`;
    return form.map(r => `<span class="form-badge form-${r}">${r}</span>`).join("");
  }

  function fmtStatus(s) {
    return { NS:"Not started", FT:"Full time", LIVE:"LIVE", HT:"Half time", POSTP:"Postponed", CANC:"Cancelled" }[s] || s;
  }

  function fmtDate(d) {
    try {
      const date = new Date(d), now = new Date();
      const time = date.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" });
      if (date.toDateString() === now.toDateString()) return `Today · ${time}`;
      if (date.toDateString() === new Date(now.getTime()+86400000).toDateString()) return `Tomorrow · ${time}`;
      return date.toLocaleDateString("en-GB", { weekday:"short", month:"short", day:"numeric" }) + ` · ${time}`;
    } catch { return d; }
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }

  function showNotification(msg, type = "") {
    const n = document.createElement("div");
    n.className = "notification" + (type ? ` ${type}` : "");
    n.textContent = msg;
    document.body.appendChild(n);
    setTimeout(() => { n.style.animation = "slideIn 0.35s reverse"; setTimeout(() => n.remove(), 350); }, 4500);
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  loadMatches();
</script>
</body>
</html>
